name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: API unit tests ────────────────────────────────────────────────
  api-tests:
    name: API Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: pnpm --filter @roamera/api test
        env:
          NODE_ENV: test
          JWT_SECRET: test-jwt-secret-for-ci-must-be-32chars!!
          DATABASE_URL: file::memory:?cache=shared

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: apps/api/coverage/
          retention-days: 7

  # ── Job 2: AI service tests (pytest) ─────────────────────────────────────
  ai-tests:
    name: AI Service Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet — skipping"
        env:
          GEMINI_API_KEY: test-key-not-real
          ENVIRONMENT: test

  # ── Job 3: Web build ──────────────────────────────────────────────────────
  web-build:
    name: Web Build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check web
        run: pnpm --filter @roamera/web typecheck

      - name: Build web
        run: pnpm --filter @roamera/web build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: http://localhost:4000

  # ── Job 4: Docker build ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: roamera-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI service Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/ai-service
          file: apps/ai-service/Dockerfile
          push: false
          tags: roamera-ai:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
