version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/app.db
      - PORT=3000
    env_file:
      - apps/api/.env
    volumes:
      - api_data:/app/data
    networks:
      - roamera
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-service:
    build:
      context: apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - apps/ai-service/.env
    networks:
      - roamera
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  api_data:

networks:
  roamera:
    driver: bridge
