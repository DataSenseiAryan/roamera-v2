version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-4000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/app.db
      - PORT=3000
    env_file:
      - path: apps/api/.env
        required: false
    volumes:
      - api_data:/app/data
    networks:
      - roamera
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-service:
    build:
      context: apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "${AI_PORT:-8000}:8000"
    env_file:
      - path: apps/ai-service/.env
        required: false
    networks:
      - roamera
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy

volumes:
  api_data:

networks:
  roamera:
    driver: bridge
